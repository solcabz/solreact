<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%PUBLIC_URL%/solcabz.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />

  <!-- SEO Meta Tags -->
  <title>Solomon Cabreza Portfolio</title>
  <meta name="description"
    content="Solomon Cabreza – Web Developer & Visual Designer. Building responsive, user-friendly websites and interfaces." />
  <meta name="keywords"
    content="Web Developer, Frontend Designer, Visual Designer, React, HTML, CSS, JavaScript, Portfolio" />
  <meta name="author" content="Solomon Cabreza" />

  <!-- Open Graph (for social sharing) -->
  <meta property="og:title" content="Solomon Cabreza Portfolio" />
  <meta property="og:description" content="Building responsive, user-friendly websites and interfaces." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://sol-cabreza-portfolio.netlify.app/" />
  <meta property="og:image" content="%PUBLIC_URL%/solcabz.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Solomon Cabreza Portfolio" />
  <meta name="twitter:description" content="Building responsive, user-friendly websites and interfaces." />
  <meta name="twitter:image" content="%PUBLIC_URL%/solcabz.png" />

  <!-- Icons -->
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/solcabz.png" />

  <!-- External Icons -->
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.8/css/line.css">

  <!-- Manifest -->
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <!-- CSP + Security Meta Tags -->
 <meta http-equiv="Content-Security-Policy"
  content="
    default-src 'self';
    script-src 'self' https://unpkg.com https://unicons.iconscout.com 'unsafe-inline';
    style-src 'self' 'unsafe-inline' https://unpkg.com https://unicons.iconscout.com https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' data:;
    connect-src 'self';
    frame-ancestors 'none';
    base-uri 'self';
  ">
  
  <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
  <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="Referrer-Policy" content="no-referrer-when-downgrade">
  <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=()">

  <!-- Trusted Types Enforcement -->
  <script>
    if (window.trustedTypes) {
      window.trustedTypes.createPolicy('default', {
        createHTML: (input) => input,
        createScript: (input) => input
      });
    }
  </script>

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Solomon Cabreza",
      "url": "https://sol-cabreza-portfolio.netlify.app/",
      "image": "%PUBLIC_URL%/solcabz.png",
      "sameAs": [
        "https://www.linkedin.com/in/solomon-cabreza-91537219/",
        "https://github.com/solcabz",
        "https://m.me/solcabreza"
      ],
      "jobTitle": "Web Developer & Visual Designer",
      "worksFor": {
        "@type": "Organization",
        "name": "Freelance / Personal Portfolio"
      }
    }
  </script>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
</body>

</html>
